# ── kernel packages ───────────────────────────────────────────────────────────
# These are arch-specific — the installer uses arch helpers to resolve the
# correct package name. Listed here for documentation only.

[packages.linux-kernel]
debian   = "linux-image-{arch}"   # resolved by _debian_kernel() in installers/debian.sh
ubuntu   = "linux-image-generic"
devuan   = "linux-image-{arch}"
arch     = "linux"
fedora   = "kernel"
alpine   = "linux-lts"            # resolved by _alpine_kernel()
void     = "linux"
opensuse = "kernel-default"
gentoo   = "gentoo-kernel-bin"

[packages.linux-headers]
debian   = "linux-headers-{arch}"
ubuntu   = "linux-headers-generic"
devuan   = "linux-headers-{arch}"
arch     = "linux-headers"
fedora   = "kernel-headers"
alpine   = "linux-headers"
void     = "linux-headers"
opensuse = "kernel-devel"
gentoo   = "sys-kernel/linux-headers"
