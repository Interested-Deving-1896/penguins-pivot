# config/package-map.toml
# Cross-distro package name translation table.
#
# Each entry maps a canonical package name to its name in each distro's
# package manager. Missing entries mean the package is not available or
# not needed on that distro.
#
# Canonical names follow the most common/descriptive convention.
# Used by extractors (running system → canonical) and installers
# (canonical → target distro package name).
#
# distro keys: debian ubuntu devuan arch fedora alpine void opensuse gentoo

# ── base system ───────────────────────────────────────────────────────────────

[packages.bash]
debian   = "bash"
ubuntu   = "bash"
devuan   = "bash"
arch     = "bash"
fedora   = "bash"
alpine   = "bash"
void     = "bash"
opensuse = "bash"
gentoo   = "app-shells/bash"

[packages.sudo]
debian   = "sudo"
ubuntu   = "sudo"
devuan   = "sudo"
arch     = "sudo"
fedora   = "sudo"
alpine   = "sudo"
void     = "sudo"
opensuse = "sudo"
gentoo   = "app-admin/sudo"

