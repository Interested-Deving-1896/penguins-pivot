name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y shellcheck
      - name: Lint all shell scripts
        run: |
          find . -name '*.sh' -not -path './.git/*' -print0 \
            | xargs -0 shellcheck --severity=warning --exclude=SC1090,SC1091

  test-extract:
    name: extract (ubuntu runner)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Extract manifest from runner
        run: sudo bash extractors/debian.sh /tmp/test.manifest.toml /
      - name: Validate manifest fields
        run: |
          python3 - /tmp/test.manifest.toml << 'PY'
          import sys, pathlib, re
          text = pathlib.Path(sys.argv[1]).read_text()
          required = ['hostname', 'arch', 'distro']
          for f in required:
              m = re.search(rf'^{f}\s*=\s*"([^"]+)"', text, re.MULTILINE)
              assert m and m.group(1), f"Missing required field: {f}"
              print(f"  {f} = {m.group(1)}")
          print("Manifest validation OK")
          PY

  test-pkgmap:
    name: package map
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Test package name translations
        run: |
          source lib/pkgmap.sh
          fail=0
          check() {
            local got
            got=$(pkgmap_canonical_to_distro "$1" "$2")
            if [[ "$got" != "$3" ]]; then
              echo "FAIL: pkgmap($1, $2) = '$got', want '$3'"
              fail=1
            else
              echo "  OK: pkgmap($1, $2) = $got"
            fi
          }
          check vim       debian  vim
          check vim       gentoo  app-editors/vim
          check vim       arch    vim
          check openssh   fedora  openssh-server
          check networkmanager arch networkmanager
          [[ $fail -eq 0 ]] || exit 1
          echo "All package map tests passed"

  test-dry-run-matrix:
    name: dry-run (${{ matrix.target }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target: [debian, ubuntu, devuan, arch, fedora, alpine, void, opensuse, gentoo]
    steps:
      - uses: actions/checkout@v4
      - name: Extract manifest
        run: sudo bash extractors/debian.sh /tmp/test.manifest.toml /
      - name: Dry-run pivot to ${{ matrix.target }}
        run: |
          sudo bash pivot.sh \
            --from /tmp/test.manifest.toml \
            --to ${{ matrix.target }} \
            --dry-run

  test-eggs-integration:
    name: eggs integration (dry-run)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Validate integration script syntax
        run: bash -n penguins-eggs/integration.sh
      - name: Shellcheck integration script
        run: shellcheck --severity=warning --exclude=SC1090,SC1091 penguins-eggs/integration.sh
      - name: Smoke-test integration env parsing
        run: |
          # Verify the script sources correctly and exports expected symbols
          bash -c '
            source penguins-eggs/integration.sh --help 2>/dev/null || true
          ' || true
          echo "Integration script syntax OK"
