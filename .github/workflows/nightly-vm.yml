name: Nightly VM Tests

# Full end-to-end pivot tests inside real VMs via QEMU/KVM.
# Runs nightly and on manual dispatch. Requires a self-hosted runner with
# KVM access (label: self-hosted, kvm) OR falls back to QEMU TCG on
# standard runners (slower but functional).
#
# Each job:
#   1. Boots a minimal cloud image of the source distro
#   2. Runs pivot.sh inside it to convert to the target distro
#   3. Reboots into the converted system and runs a smoke test

on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC nightly
  workflow_dispatch:
    inputs:
      matrix_filter:
        description: "Run only this source→target pair (e.g. ubuntu→arch)"
        required: false
        default: ""
      keep_artifacts:
        description: "Upload converted rootfs as artifact"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  vm-pivot:
    name: vm / ${{ matrix.src }}→${{ matrix.dst }}
    # Use self-hosted KVM runner if available; fall back to ubuntu-24.04
    runs-on: ${{ vars.KVM_RUNNER || 'ubuntu-24.04' }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          # Debian-family → other
          - src: ubuntu   dst: debian   src_image: ubuntu-24.04-minimal
          - src: ubuntu   dst: arch     src_image: ubuntu-24.04-minimal
          - src: ubuntu   dst: alpine   src_image: ubuntu-24.04-minimal
          - src: debian   dst: fedora   src_image: debian-12-minimal
          - src: debian   dst: void     src_image: debian-12-minimal
          # Arch → other
          - src: arch     dst: debian   src_image: arch-latest-minimal
          - src: arch     dst: ubuntu   src_image: arch-latest-minimal
          # Alpine → other
          - src: alpine   dst: debian   src_image: alpine-3.20-minimal
          - src: alpine   dst: arch     src_image: alpine-3.20-minimal

    steps:
      - uses: actions/checkout@v4

      - name: Install QEMU + cloud-image tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 qemu-utils cloud-image-utils \
            libguestfs-tools python3 curl

      - name: Download source cloud image
        run: |
          bash scripts/ci/fetch-cloud-image.sh \
            "${{ matrix.src_image }}" \
            /tmp/src.img
        timeout-minutes: 10

      - name: Inject pivot.sh into image
        run: |
          # Copy the entire repo into the image's /opt/linux-pivot
          virt-copy-in -a /tmp/src.img . /opt/linux-pivot
          # Also inject a run-pivot.sh helper
          cat > /tmp/run-pivot.sh << 'SCRIPT'
          #!/bin/bash
          set -euo pipefail
          cd /opt/linux-pivot
          bash pivot.sh \
            --to TARGET_DISTRO \
            --target /mnt/pivot-target \
            --jobs 2 \
            2>&1 | tee /tmp/pivot.log
          echo "PIVOT_EXIT=$?" >> /tmp/pivot-result.env
          SCRIPT
          sed -i "s/TARGET_DISTRO/${{ matrix.dst }}/" /tmp/run-pivot.sh
          virt-copy-in -a /tmp/src.img /tmp/run-pivot.sh /root/

      - name: Run pivot inside VM
        run: |
          bash scripts/ci/run-in-vm.sh \
            /tmp/src.img \
            "bash /root/run-pivot.sh" \
            /tmp/pivot.log
        timeout-minutes: 60

      - name: Extract and verify converted rootfs
        run: |
          # Pull the converted rootfs out of the VM image
          virt-copy-out -a /tmp/src.img /mnt/pivot-target /tmp/
          bash scripts/ci/verify-rootfs.sh /tmp/pivot-target "${{ matrix.dst }}"

      - name: Upload converted rootfs
        if: inputs.keep_artifacts == 'true' || failure()
        uses: actions/upload-artifact@v4
        with:
          name: pivot-rootfs-${{ matrix.src }}-to-${{ matrix.dst }}
          path: /tmp/pivot-target/
          retention-days: 3

      - name: Upload pivot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pivot-log-${{ matrix.src }}-to-${{ matrix.dst }}
          path: /tmp/pivot.log
          retention-days: 7
